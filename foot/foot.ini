# =========================
# FOOT TERMINAL CONFIG
# =========================

include=~/.config/foot/themes/current.ini

[main]
font=OpenDyslexicM Nerd Font Mono:size=8
pad=5x0 center
dpi-aware=yes
initial-window-size-pixels=1200x720
term=xterm-256color

[scrollback]
lines=10000

[cursor]
style=beam
blink=yes
beam-thickness=1.5

[mouse]
hide-when-typing=yes

[url]
launch=xdg-open ${url}

[bell]
urgent=no
notify=no
visual=yes